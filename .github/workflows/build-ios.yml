name: Compilar SimpMusic iOS (Compose Multiplatform)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Dar permisos de ejecución a Gradle
        run: chmod +x gradlew || true

      - name: Buscar y compilar iOS automáticamente
        run: |
          # 1. Buscar automáticamente dónde está el archivo de Xcode
          XCODE_PROJ=$(find . -name "*.xcodeproj" | head -n 1)
          
          if [ -z "$XCODE_PROJ" ]; then
            echo "Error crítico: No se encontró ningún archivo .xcodeproj en todo el repositorio."
            echo "Esto significa que el desarrollador aún no ha creado la interfaz nativa para iOS."
            exit 1
          fi
          
          # Obtener la ruta de la carpeta y entrar en ella
          IOS_DIR=$(dirname "$XCODE_PROJ")
          echo "Proyecto de iOS encontrado en: $IOS_DIR"
          cd "$IOS_DIR"

          # 2. Instalar CocoaPods si existen
          if [ -f "Podfile" ]; then
            pod install
          fi

          # 3. Detectar si compilar como Workspace o Project
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          if [ -n "$WORKSPACE" ]; then
            TARGET="-workspace $(basename "$WORKSPACE")"
          else
            TARGET="-project $(basename "$XCODE_PROJ")"
          fi
          
          # Obtener el nombre (scheme) del proyecto
          SCHEME=$(basename "$XCODE_PROJ" .xcodeproj)

          # 4. Compilar deshabilitando la firma de Apple
          xcodebuild clean build \
            $TARGET \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT=$(pwd)/build

          # 5. Crear la carpeta Payload en el directorio anterior
          mkdir -p ../Payload
          
          # 6. Mover la app compilada a Payload
          mv build/Release-iphoneos/*.app ../Payload/ || echo "No se generó el archivo .app"

          # 7. Regresar y comprimir el .ipa
          cd ..
          zip -qr SimpMusic.ipa Payload

      - name: Subir archivo .ipa para descargar
        uses: actions/upload-artifact@v4
        with:
          name: SimpMusic-iOS-IPA
          path: SimpMusic.ipa
          retention-days: 7
