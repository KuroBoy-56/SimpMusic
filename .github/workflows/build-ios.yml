name: Compilar SimpMusic iOS (Compose Multiplatform)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Java (Requerido para Gradle y Kotlin)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Versión recomendada para Android/KMP

      - name: Dar permisos de ejecución a Gradle
        run: chmod +x gradlew

      - name: Compilar iOS y generar .ipa (Sin firma)
        run: |
          # 1. Entrar a la carpeta nativa de iOS (estándar en KMP)
          cd iosApp

          # 2. Instalar CocoaPods si el proyecto los requiere
          if [ -f "Podfile" ]; then
            pod install
          fi

          # 3. Detectar si usa Workspace (CocoaPods) o Project estándar
          if [ -d "iosApp.xcworkspace" ]; then
            TARGET="-workspace iosApp.xcworkspace"
          else
            TARGET="-project iosApp.xcodeproj"
          fi

          # 4. Compilar con Xcode deshabilitando la firma obligatoria de Apple
          # Xcode llamará a Gradle automáticamente para compilar la parte de Compose
          xcodebuild clean build \
            $TARGET \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT=$(pwd)/build

          # 5. Preparar la estructura Payload requerida para el archivo .ipa
          mkdir -p ../Payload
          
          # 6. Mover el paquete compilado (.app) a la carpeta Payload
          mv build/Release-iphoneos/*.app ../Payload/

          # 7. Regresar a la raíz del proyecto y comprimir
          cd ..
          zip -qr SimpMusic.ipa Payload

      - name: Subir archivo .ipa para descargar
        uses: actions/upload-artifact@v4
        with:
          name: SimpMusic-iOS-IPA
          path: SimpMusic.ipa
          retention-days: 7
