name: Compilar SimpMusic iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    # OBLIGATORIO: Usar máquina macOS
    runs-on: macos-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      # --- AQUÍ ESTÁ LA SOLUCIÓN AL ERROR 126 ---
      - name: Dar permisos de ejecución a scripts internos
        run: |
          chmod +x android/gradlew
          # Por si hay otros scripts .sh ocultos que SimpMusic necesite ejecutar
          find . -type f -name "*.sh" -exec chmod +x {} \;

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar dependencias de Flutter
        run: flutter pub get

      - name: Compilar iOS (Sin firma para instalar en Windows)
        run: |
          # 1. Compila la app de iOS sin certificados
          flutter build ios --release --no-codesign
          
          # 2. Prepara la estructura del archivo .ipa
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          
          # 3. Comprime el resultado
          zip -qr SimpMusic.ipa Payload

      - name: Subir archivo .ipa para descargar
        uses: actions/upload-artifact@v4
        with:
          name: SimpMusic-iOS-IPA
          path: SimpMusic.ipa
          retention-days: 7
